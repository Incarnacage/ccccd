<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地月轨道运行模拟器</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* 画布容器 */
        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        /* 加载提示 */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 18px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="loading">加载天体资源中...</div>
    </div>

    <!-- 引入Three.js和轨道控制器 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 场景核心组件
        let scene, camera, renderer, controls;
        
        // 天体对象
        let earth, moon, orbit;
        
        // 轨道参数
        const moonOrbitRadius = 3;    // 月球轨道半径
        const moonOrbitSpeed = 0.005; // 月球公转速度
        let moonAngle = 0;            // 月球当前角度

        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                75,                     // 视角
                window.innerWidth / window.innerHeight, // 宽高比
                0.1,                    // 近裁剪面
                1000                    // 远裁剪面
            );
            camera.position.set(0, 2, 8); // 设置相机初始位置

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({
                antialias: true,        // 抗锯齿
                alpha: true             // 透明背景
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 1); // 设置背景颜色为黑色
            document.getElementById('container').appendChild(renderer.domElement);

            // 添加轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;        // 阻尼效果，使视角移动更平滑
            controls.dampingFactor = 0.05;        // 阻尼系数
            controls.minDistance = 2;             // 最小缩放距离
            controls.maxDistance = 20;            // 最大缩放距离
            controls.enablePan = true;            // 启用平移功能

            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);

            // 添加方向光（模拟太阳光）
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 3, 5);
            scene.add(directionalLight);

            // 创建天体
            createEarth();
            createMoon();
            createOrbit();

            // 添加星空背景
            createStars();

            // 隐藏加载提示
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 2000);

            // 开始动画循环
            animate();

            // 监听窗口大小变化
            window.addEventListener('resize', onWindowResize);
        }

        // 创建地球
        function createEarth() {
            // 地球几何体
            const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
            
            // NASA地球纹理贴图
            const earthTexture = new THREE.TextureLoader().load(
                'https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg',
                (texture) => {
                    texture.wrapS = THREE.ClampToEdgeWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                }
            );
            
            // 地球材质
            const earthMaterial = new THREE.MeshPhongMaterial({
                map: earthTexture,
                shininess: 10
            });

            // 创建地球网格
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.name = 'Earth';
            scene.add(earth);
        }

        // 创建月球
        function createMoon() {
            // 月球几何体
            const moonGeometry = new THREE.SphereGeometry(0.27, 32, 32);
            
            // NASA月球纹理贴图
            const moonTexture = new THREE.TextureLoader().load(
                'https://www.solarsystemscope.com/textures/download/2k_moon.jpg',
                (texture) => {
                    texture.wrapS = THREE.ClampToEdgeWrapping;
                    texture.wrapT = THREE.ClampToEdgeWrapping;
                }
            );
            
            // 月球材质
            const moonMaterial = new THREE.MeshPhongMaterial({
                map: moonTexture,
                shininess: 5
            });

            // 创建月球网格
            moon = new THREE.Mesh(moonGeometry, moonMaterial);
            moon.name = 'Moon';
            scene.add(moon);
        }

        // 创建月球轨道
        function createOrbit() {
            // 轨道几何体
            const orbitGeometry = new THREE.RingGeometry(
                moonOrbitRadius - 0.01,  // 内半径
                moonOrbitRadius + 0.01,  // 外半径
                64                       // 分段数
            );
            
            // 轨道材质
            const orbitMaterial = new THREE.MeshBasicMaterial({
                color: 0x444444,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.3
            });

            // 创建轨道网格
            orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbit.rotation.x = Math.PI / 2; // 旋转轨道使其水平
            scene.add(orbit);
        }

        // 创建星空背景
        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.05,
                transparent: true,
                opacity: 0.8
            });

            // 生成随机星星位置
            const starsVertices = [];
            for (let i = 0; i < 2000; i++) {
                const x = (Math.random() - 0.5) * 100;
                const y = (Math.random() - 0.5) * 100;
                const z = (Math.random() - 0.5) * 100;
                starsVertices.push(x, y, z);
            }

            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
        }

        // 更新月球位置（公转）
        function updateMoonPosition() {
            moonAngle += moonOrbitSpeed;
            
            // 计算月球新位置
            moon.position.x = Math.cos(moonAngle) * moonOrbitRadius;
            moon.position.z = Math.sin(moonAngle) * moonOrbitRadius;
            
            // 月球自转（始终一面朝向地球）
            moon.rotation.y = moonAngle;
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 更新月球位置
            updateMoonPosition();
            
            // 更新控制器阻尼
            controls.update();
            
            // 渲染场景
            renderer.render(scene, camera);
        }

        // 窗口大小变化处理
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 页面加载完成后初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
